            { id: 23, text: "Môi trường nuôi cấy liên tục là môi trường nuôi cấy:", options: ["A. Được bổ sung chất dinh dưỡng, không được lấy đi các sản phẩm của quá trình nuôi cấy", "B. Không được bổ sung chất dinh dưỡng, nhưng được lấy đi các sản phẩm của quá trình nuôi cấy.", "C. Không được bổ sung chất dinh dưỡng, không được lấy đi các sản phẩm của quá trình nuôi cấy.", "D. Được bổ sung chất dinh dưỡng, và được lấy đi các sản phẩm của quá trình nuôi cấy."], correct: 3 },

            {
                id: 3,
                context: "Sữa chua là một chế phẩm sữa được sản xuất bằng cách lên men sữa bò tươi, sữa bột hay sữa động vật nói chung. Dựa trên thông tin và kiến thức đã học, hãy cho biết mỗi mệnh đề sau là đúng hay sai khi nói về quá trình làm sữa chua?",
                statements: [
                    { id: "3a", text: "a. Lên men sữa chua là lên men ethanol.", isTrue: false },
                    { id: "3b", text: "b. Quá trình lên men sữa chua có tạo ra ethanol và acetic acid.", isTrue: false },
                    { id: "3c", text: "c. Quá trình lên men sữa chua có sự tham gia của vi khuẩn lactic dị hình.", isTrue: false },
                    { id: "3d", text: "d. Quá trình làm sữa chua thực chất là quá trình phân giải carbohydrate của vi sinh vật.", isTrue: true }
                ]
            },
            {
                id: 4,
                context: "Khi nói về sự sinh trưởng của quần thể vi khuẩn, mỗi mệnh đề sau là đúng hay sai?",
                statements: [
                    { id: "4a", text: "a. Trong nuôi cấy liên tục, quần thể vi sinh vật sinh trưởng liên tục, mật độ vi sinh vật tương đối ổn định.", isTrue: true },
                    { id: "4b", text: "b. Trong nuôi cấy không liên tục, số lượng tế bào trong quần thể tăng rất nhanh ở pha cân bằng.", isTrue: false },
                    { id: "4c", text: "c. Mục đích của 2 phương pháp nuôi cấy liên tục và không liên tục là để sản xuất sinh khối.", isTrue: false },
                    { id: "4d", text: "d. Trong nuôi cấy liên tục có 4 pha: Tiềm phát -> luỹ thừa -> cân bằng -> suy vong.", isTrue: false }
                ]
            },
            {
                id: 5,
                context: "Hãy cho biết mỗi nhận định sau đây là Đúng hay Sai?",
                statements: [
                    { id: "5a", text: "a. Đơn vị cấu tạo của vỏ capsid của virus là capsomer.", isTrue: true },
                    { id: "5b", text: "b. Lớp vỏ ngoài của virus có tên là enternal.", isTrue: false },
                    { id: "5c", text: "c. Lớp vỏ ngoài có cấu tạo là lớp đơn phospholipid và protein.", isTrue: false },
                    { id: "5d", text: "d. Các gai mang tính kháng nguyên giúp virus bám vào vật chủ, nhận diện tế bào vật chủ là các gai glycoprotein.", isTrue: true }
                ]
            },
            {
                id: 6,
                context: "Hãy cho biết mỗi nhận định sau đây là Đúng hay Sai?",
                statements: [
                    { id: "6a", text: "a. Phage còn có tên gọi khác là thực thể khuẩn.", isTrue: true },
                    { id: "6b", text: "b. Hình thức sống của virus là sống kí sinh nội bào bắt buộc.", isTrue: true },
                    { id: "6c", text: "c. Virus không được xem là một thực thể sống hoàn chỉnh do virus có kích thước quá nhỏ bé.", isTrue: false },
                    { id: "6d", text: "d. Trong điều kiện ngoài tế bào, virus có khả năng tồn tại lâu dài ở trạng thái đại phân tử hóa học.", isTrue: true }
                ]
            },
            {
                id: 7,
                context: "Một nhà khoa học tiến hành thí nghiệm lai hai chủng virus A và B như sau: Lấy vỏ capsid của virus A trộn với nucleic acid của virus B tạo thành virus lai. Biết mỗi loại virus chỉ kí sinh trong một loại vật chủ, mỗi nhận định sau đây là Đúng hay Sai?",
                statements: [
                    { id: "7a", text: "a. Virus lai có vỏ của chủng A và lõi của chủng B", isTrue: true },
                    { id: "7b", text: "b. Virus lai có thể xâm nhập vào tế bào vật chủ của virus B.", isTrue: false },
                    { id: "7c", text: "c. Virus lai sau khi nhân lên có thể xâm nhập vào vật chủ của cả virus A và virus B.", isTrue: false },
                    { id: "7d", text: "d. Virus lai sau khi nhân lên sẽ có vỏ của chủng B và lõi của chủng B.", isTrue: true }
                ]
            }
        ];

        // Icons
        const CheckIcon = () => (
            <svg className="w-5 h-5 inline-block mr-2 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" />
            </svg>
        );

        const XIcon = () => (
            <svg className="w-5 h-5 inline-block mr-2 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
            </svg>
        );

        const App = () => {
            const [answers, setAnswers] = React.useState({});
            const [tfAnswers, setTfAnswers] = React.useState({});
            const [activeTab, setActiveTab] = React.useState('mcq'); // 'mcq' or 'tf'
            const [showConfirmModal, setShowConfirmModal] = React.useState(false);
            
            // Tính số điểm MCQ
            const correctCount = Object.keys(answers).filter(
                id => answers[id] === questionsData.find(q => q.id === parseInt(id)).correct
            ).length;
            const answeredCount = Object.keys(answers).length;

            // Tính số điểm T/F
            let tfTotalStmts = 0;
            trueFalseData.forEach(q => tfTotalStmts += q.statements.length);
            
            let tfCorrectCount = 0;
            Object.keys(tfAnswers).forEach(stmtId => {
                const stmt = trueFalseData.flatMap(q => q.statements).find(s => s.id === stmtId);
                if (stmt && tfAnswers[stmtId] === stmt.isTrue) {
                    tfCorrectCount++;
                }
            });
            const tfAnsweredCount = Object.keys(tfAnswers).length;

            const handleSelect = (questionId, optionIndex) => {
                if (answers[questionId] !== undefined) return; // Đã trả lời thì không cho đổi
                setAnswers(prev => ({
                    ...prev,
                    [questionId]: optionIndex
                }));
            };

            const requestReset = () => {
                setShowConfirmModal(true);
            };

            const confirmReset = () => {
                setAnswers({});
                setTfAnswers({});
                setShowConfirmModal(false);
                window.scrollTo(0, 0);
            };

            const cancelReset = () => {
                setShowConfirmModal(false);
            };

            return (
                <div className="min-h-screen pb-20">
                    {/* Header cố định */}
                    <header className="sticky top-0 z-50 bg-blue-600 text-white shadow-lg py-4 px-6 flex flex-col sm:flex-row justify-between items-center">
                        <h1 className="text-xl md:text-2xl font-bold mb-2 sm:mb-0">Ôn Tập Sinh 10 - Cuối HK2</h1>
                        <div className="flex flex-col sm:flex-row items-center space-y-2 sm:space-y-0 sm:space-x-4">
                            <div className="text-sm font-semibold bg-blue-700 px-3 py-1 rounded-full border border-blue-400">
                                Trắc nghiệm: <span className="text-green-300">{correctCount}</span> / {answeredCount}
                            </div>
                            <div className="text-sm font-semibold bg-blue-700 px-3 py-1 rounded-full border border-blue-400">
                                Đúng/Sai: <span className="text-green-300">{tfCorrectCount}</span> / {tfAnsweredCount}
                            </div>
                            <button onClick={requestReset} className="text-sm bg-red-500 hover:bg-red-600 px-3 py-1.5 rounded-lg font-medium shadow smooth-transition">
                                Làm lại
                            </button>
                        </div>
                    </header>

                    {/* Tabs navigation */}
                    <div className="max-w-4xl mx-auto px-4 md:px-6 mt-6">
                        <div className="flex space-x-2 bg-gray-200 p-1 rounded-lg">
                            <button 
                                onClick={() => setActiveTab('mcq')}
                                className={`flex-1 py-2 px-4 rounded-md font-medium text-sm sm:text-base smooth-transition ${activeTab === 'mcq' ? 'bg-white text-blue-600 shadow' : 'text-gray-600 hover:text-gray-800 hover:bg-gray-300'}`}
                            >
                                Phần I: Chọn đáp án
                            </button>
                            <button 
                                onClick={() => setActiveTab('tf')}
                                className={`flex-1 py-2 px-4 rounded-md font-medium text-sm sm:text-base smooth-transition ${activeTab === 'tf' ? 'bg-white text-blue-600 shadow' : 'text-gray-600 hover:text-gray-800 hover:bg-gray-300'}`}
                            >
                                Phần II: Đúng/Sai
                            </button>
                        </div>
                    </div>

                    {/* Custom Confirm Modal */}
                    {showConfirmModal && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 z-[60] flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl shadow-2xl p-6 max-w-sm w-full text-center">
                                <h3 className="text-xl font-bold text-gray-800 mb-4">Xác nhận làm lại</h3>
                                <p className="text-gray-600 mb-6">Bạn có chắc chắn muốn xóa hết kết quả và làm lại bài từ đầu không?</p>
                                <div className="flex justify-center space-x-4">
                                    <button onClick={cancelReset} className="px-5 py-2 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300 transition-colors font-medium">Hủy</button>
                                    <button onClick={confirmReset} className="px-5 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition-colors font-medium">Đồng ý</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Nội dung chính */}
                    <main className="max-w-4xl mx-auto p-4 md:p-6 mt-2">
                        {/* Tab Phần I: Trắc nghiệm MCQ */}
                        {activeTab === 'mcq' && (
                            <div className="fade-in">
                                <div className="bg-white rounded-xl shadow-md p-6 mb-8 border border-gray-200">
                                    <h2 className="text-xl font-bold text-gray-800 mb-2">Phần I: Trắc nghiệm (40 Câu)</h2>
                                    <p className="text-gray-600">Chọn một đáp án đúng nhất cho mỗi câu hỏi. Kết quả đúng/sai sẽ hiển thị ngay lập tức.</p>
                                </div>

                                <div className="space-y-8">
                                    {questionsData.map((q, index) => {
                                        const isAnswered = answers[q.id] !== undefined;
                                        const selectedOpt = answers[q.id];

                                        return (
                                            <div key={q.id} className="bg-white rounded-xl shadow-md p-6 md:p-8 border-l-4 border-blue-500 hover:shadow-lg smooth-transition">
                                                <h3 className="text-lg font-semibold text-gray-800 mb-4 leading-relaxed">
                                                    <span className="text-blue-600 font-bold mr-2">Câu {index + 1}:</span>
                                                    {q.text}
                                                </h3>
                                                
                                                <div className="flex flex-col space-y-3">
                                                    {q.options.map((option, optIdx) => {
                                                        const isCorrectOpt = optIdx === q.correct;
                                                        const isSelected = selectedOpt === optIdx;
                                                        
                                                        let btnClass = "text-left px-5 py-3 rounded-lg border-2 font-medium smooth-transition w-full text-base lg:text-lg ";
                                                        
                                                        if (!isAnswered) {
                                                            btnClass += "border-gray-200 bg-gray-50 text-gray-700 hover:bg-blue-50 hover:border-blue-300 cursor-pointer";
                                                        } else {
                                                            if (isSelected && isCorrectOpt) {
                                                                btnClass += "border-green-500 bg-green-500 text-white shadow-md";
                                                            } else if (isSelected && !isCorrectOpt) {
                                                                btnClass += "border-red-500 bg-red-500 text-white shadow-md";
                                                            } else if (!isSelected && isCorrectOpt) {
                                                                btnClass += "border-green-400 bg-green-50 text-green-700";
                                                            } else {
                                                                btnClass += "border-gray-200 bg-gray-50 text-gray-400 opacity-60 cursor-not-allowed";
                                                            }
                                                        }

                                                        return (
                                                            <button 
                                                                key={optIdx}
                                                                onClick={() => handleSelect(q.id, optIdx)}
                                                                disabled={isAnswered}
                                                                className={btnClass}
                                                            >
                                                                <div className="flex items-center">
                                                                    {isAnswered && isSelected && isCorrectOpt && <CheckIcon />}
                                                                    {isAnswered && isSelected && !isCorrectOpt && <XIcon />}
                                                                    <span>{option}</span>
                                                                </div>
                                                            </button>
                                                        );
                                                    })}
                                                </div>

                                                {isAnswered && (
                                                    <div className={`mt-4 p-3 rounded-md font-medium text-sm sm:text-base flex items-center ${selectedOpt === q.correct ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`}>
                                                        {selectedOpt === q.correct ? 
                                                            "✅ Rất tốt! Bạn đã trả lời đúng." : 
                                                            `❌ Sai rồi! Đáp án đúng là: ${q.options[q.correct].substring(0, 2)}`}
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                                
                                {answeredCount === questionsData.length && (
                                    <div className="mt-12 bg-blue-600 text-white rounded-xl shadow-xl p-8 text-center">
                                        <h2 className="text-3xl font-bold mb-4">Hoàn thành Phần I! 🎉</h2>
                                        <p className="text-xl mb-6">Điểm số Phần I của bạn: <strong>{correctCount} / 40</strong></p>
                                        <button onClick={() => {setActiveTab('tf'); window.scrollTo(0,0);}} className="bg-white text-blue-600 hover:bg-gray-100 font-bold py-3 px-8 rounded-full shadow-lg smooth-transition text-lg">
                                            Chuyển sang Phần II
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Tab Phần II: Đúng/Sai */}
                        {activeTab === 'tf' && (
                            <div className="fade-in">
                                <div className="bg-white rounded-xl shadow-md p-6 mb-8 border border-gray-200">
                                    <h2 className="text-xl font-bold text-gray-800 mb-2">Phần II: Trắc nghiệm Đúng/Sai (7 Câu)</h2>
                                    <p className="text-gray-600">Với mỗi câu hỏi, chọn Đúng hoặc Sai cho từng ý a, b, c, d. Kết quả sẽ hiện ngay sau khi chọn.</p>
                                </div>

                                <div className="space-y-8">
                                    {trueFalseData.map((q, index) => {
                                        return (
                                            <div key={q.id} className="bg-white rounded-xl shadow-md p-6 md:p-8 border-l-4 border-purple-500 hover:shadow-lg smooth-transition">
                                                <h3 className="text-lg font-semibold text-gray-800 mb-6 leading-relaxed">
                                                    <span className="text-purple-600 font-bold mr-2">Câu {index + 1}:</span>
                                                    {q.context}
                                                </h3>
                                                
                                                <div className="space-y-4">
                                                    {q.statements.map(stmt => {
                                                        const isAnswered = tfAnswers[stmt.id] !== undefined;
                                                        const userChoice = tfAnswers[stmt.id];

                                                        return (
                                                            <div key={stmt.id} className="flex flex-col md:flex-row md:items-center justify-between p-4 bg-gray-50 rounded-lg border border-gray-200">
                                                                <span className="text-gray-800 font-medium mb-3 md:mb-0 md:mr-4 md:flex-1">{stmt.text}</span>
                                                                
                                                                <div className="flex space-x-2 shrink-0">
                                                                    <button 
                                                                        onClick={() => !isAnswered && setTfAnswers(prev => ({...prev, [stmt.id]: true}))}
                                                                        disabled={isAnswered}
                                                                        className={`px-4 py-2 rounded-md font-semibold transition-colors ${
                                                                            !isAnswered ? 'bg-white border-2 border-gray-300 text-gray-600 hover:border-green-500 hover:text-green-600' : 
                                                                            userChoice === true ? (stmt.isTrue ? 'bg-green-500 text-white border-2 border-green-500' : 'bg-red-500 text-white border-2 border-red-500') :
                                                                            (stmt.isTrue ? 'bg-green-100 text-green-700 border-2 border-green-300' : 'bg-gray-200 text-gray-300 border-2 border-gray-200 cursor-not-allowed')
                                                                        }`}
                                                                    >
                                                                        Đúng
                                                                    </button>
                                                                    <button 
                                                                        onClick={() => !isAnswered && setTfAnswers(prev => ({...prev, [stmt.id]: false}))}
                                                                        disabled={isAnswered}
                                                                        className={`px-4 py-2 rounded-md font-semibold transition-colors ${
                                                                            !isAnswered ? 'bg-white border-2 border-gray-300 text-gray-600 hover:border-red-500 hover:text-red-600' : 
                                                                            userChoice === false ? (!stmt.isTrue ? 'bg-green-500 text-white border-2 border-green-500' : 'bg-red-500 text-white border-2 border-red-500') :
                                                                            (!stmt.isTrue ? 'bg-green-100 text-green-700 border-2 border-green-300' : 'bg-gray-200 text-gray-300 border-2 border-gray-200 cursor-not-allowed')
                                                                        }`}
                                                                    >
                                                                        Sai
                                                                    </button>
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>

                                {tfAnsweredCount === tfTotalStmts && (
                                    <div className="mt-12 bg-purple-600 text-white rounded-xl shadow-xl p-8 text-center">
                                        <h2 className="text-3xl font-bold mb-4">Hoàn thành Phần II! 🎉</h2>
                                        <p className="text-xl mb-6">Điểm số Đúng/Sai: <strong>{tfCorrectCount} / {tfTotalStmts}</strong></p>
                                        <p className="text-lg mb-6">Tổng điểm cả 2 phần: <strong className="text-yellow-300">{correctCount + tfCorrectCount} / {questionsData.length + tfTotalStmts}</strong></p>
                                        <button onClick={requestReset} className="bg-white text-purple-600 hover:bg-gray-100 font-bold py-3 px-8 rounded-full shadow-lg smooth-transition text-lg">
                                            Làm lại toàn bộ
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
