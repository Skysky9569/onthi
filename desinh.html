    <script type="text/babel">
        // Data: 40 Câu hỏi trắc nghiệm (Cập nhật có giải thích)
        const questionsData = [
            { id: 1, text: "Dựa vào thành phần cấu tạo, có thể chia vi sinh vật thành:", options: ["A. VSV nhân sơ và VSV nhân thực.", "B. VSV đa bào và VSV đơn bào.", "C. VSV nhân sơ và VSV đơn bào.", "D. VSV nhân thực và VSV đa bào."], correct: 0, explanation: "Dựa vào cấu trúc tế bào, vi sinh vật được chia thành 2 nhóm chính: nhân sơ (vi khuẩn, archaea) và nhân thực (vi nấm, vi tảo, động vật nguyên sinh)." },
            { id: 2, text: "Đặc điểm có ở hầu hết các loài vi sinh vật là gì?", options: ["A. Chuyển hoá chất dinh dưỡng nhanh.", "B. Thuộc các giới: Nguyên sinh, Nấm, Động vật.", "C. Kích thước siêu hiển vi (được đo bằng nanomet).", "D. Chỉ phân bố ở nơi có điều kiện khắc nghiệt."], correct: 0, explanation: "Nhờ tỉ lệ diện tích bề mặt / thể tích (S/V) lớn, vi sinh vật hấp thụ và trao đổi chất rất nhanh để sinh trưởng." },
            { id: 3, text: "Các VSV nào sau đây là VSV nhân thực?", options: ["A. Nấm đơn bào, động vật nguyên sinh.", "B. Archaea, vi khuẩn.", "C. Vi nấm, vi khuẩn.", "D. Động vật nguyên sinh, vi khuẩn."], correct: 0, explanation: "Nấm (như nấm men) và động vật nguyên sinh (như trùng roi, trùng giày) đều có màng nhân bao bọc vật chất di truyền, nên thuộc nhóm nhân thực." },
            { id: 4, text: "Điều nào sau đây là sai khi nói về đặc điểm của vi sinh vật?", options: ["A. Thích ứng cao với môi trường.", "B. Trao đổi chất nhanh.", "C. Hấp thụ dinh dưỡng chậm.", "D. Phân bố rất rộng."], correct: 2, explanation: "Vi sinh vật hấp thụ và chuyển hóa chất dinh dưỡng rất nhanh, chứ không hề chậm." },
            { id: 5, text: "Nhóm vi sinh vật có hình thức quang dị dưỡng là:", options: ["A. Nấm, động vật nguyên sinh.", "B. Vi khuẩn không chứa lưu huỳnh màu lục và màu tía.", "C. Vi tảo, vi khuẩn lam.", "D. Vi khuẩn nitrit hoá, vi khuẩn sắt."], correct: 1, explanation: "Vi khuẩn không chứa lưu huỳnh màu lục và màu tía sử dụng ánh sáng làm nguồn năng lượng (quang) và chất hữu cơ làm nguồn carbon (dị dưỡng)." },
            { id: 6, text: "Hình thức dinh dưỡng đều dùng nguồn năng lượng và nguồn carbon từ chất hữu cơ được gọi là:", options: ["A. Quang tự dưỡng.", "B. Hóa dị dưỡng.", "C. Hóa tự dưỡng.", "D. Quang dị dưỡng."], correct: 1, explanation: "Hóa dị dưỡng là kiểu dinh dưỡng sử dụng năng lượng từ các phản ứng hóa học (hóa) và nguồn carbon từ các hợp chất hữu cơ (dị dưỡng)." },
            { id: 7, text: "Các vi sinh vật nào sau đây có hình thức dinh dưỡng theo kiểu quang tự dưỡng?", options: ["A. Tảo đơn bào, các vi khuẩn chứa diệp lục.", "B. Nấm và tất cả vi khuẩn.", "C. Vi khuẩn lưu huỳnh, động vật nguyên sinh.", "D. Vi khuẩn lam, vi khuẩn nitrate hóa."], correct: 0, explanation: "Tảo và các vi khuẩn chứa diệp lục sử dụng ánh sáng mặt trời để tổng hợp chất hữu cơ từ CO2 (quang tự dưỡng)." },
            { id: 8, text: "Các hình thức dinh dưỡng của vi sinh vật được phân chia dựa trên các tiêu chí:", options: ["A. Nhóm sinh vật và nguồn năng lượng.", "B. Nhóm sinh vật và nguồn cacbon chủ yếu.", "C. Hình thức hô hấp nguồn cacbon chủ yếu.", "D. Nguồn năng lượng và nguồn cacbon chủ yếu."], correct: 3, explanation: "Kiểu dinh dưỡng được xác định bởi 2 yếu tố: Nguồn năng lượng (Ánh sáng hay hóa học) và Nguồn Carbon (CO2 hay chất hữu cơ)." },
            { id: 9, text: "Đặc điểm có ở hầu hết các loài vi sinh vật là:", options: ["A. Thuộc nhiều giới: nguyên sinh, nấm và động vật.", "B. Kích thước siêu hiển vi (được đo bằng nanomet).", "C. Hấp thụ và chuyển hóa chất dinh dưỡng nhanh.", "D. Chỉ phân bố ở những nơi có điều kiện khắc nghiệt."], correct: 2, explanation: "Hấp thụ và chuyển hóa nhanh là đặc điểm nổi bật nhất. Kích thước nanomet là sai vì đa phần vi khuẩn đo bằng micromet (µm)." },
            { id: 10, text: "Để phân biệt vi khuẩn Gram dương (+) và Gram (–) người ta đã sử dụng phương pháp nào?", options: ["A. Nhuộm Gram.", "B. Nhuộm đơn.", "C. Nhuộm kép.", "D. Quan sát."], correct: 0, explanation: "Phương pháp nhuộm Gram dựa vào sự khác biệt trong cấu trúc thành tế bào peptidoglycan để phân biệt hai nhóm vi khuẩn này." },
            { id: 11, text: "Đặc điểm nào sau đây không đúng về cấu tạo của vi sinh vật?", options: ["A. Cơ thể nhỏ bé, chỉ nhìn thấy rõ dưới kính hiển vi.", "B. Tất cả các vi sinh vật đều có nhân sơ.", "C. Một số vi sinh vật có cơ thể đa bào.", "D. Đa số vi sinh vật có cơ thể là một tế bào."], correct: 1, explanation: "Vi sinh vật bao gồm cả nhân sơ (vi khuẩn) và nhân thực (vi nấm, vi tảo). Nên nói 'tất cả đều có nhân sơ' là sai." },
            { id: 12, text: "Phương pháp nào sau đây dùng để quan sát khả năng di động của vi khuẩn?", options: ["A. Nhuộm đơn.", "B. Soi tươi.", "C. Nhuộm Gram.", "D. Phân lập."], correct: 1, explanation: "Phương pháp soi tươi (tiêu bản giọt ép/giọt treo) giúp quan sát trực tiếp trạng thái sống và sự di chuyển của vi khuẩn dưới kính hiển vi." },
            { id: 13, text: "Để tổng hợp được các chất hữu cơ, mọi vi sinh vật cần bắt buộc sử dụng:", options: ["A. Carbon.", "B. Năng lượng và enzyme.", "C. Năng lượng.", "D. Carbon và ánh sáng."], correct: 1, explanation: "Các phản ứng đồng hóa (tổng hợp chất) đều cần tiêu tốn năng lượng (ATP) và bắt buộc phải có enzyme nội bào xúc tác." },
            { id: 14, text: "Phương trình tổng hợp protein ở vi sinh vật nào sau đây là đúng?", options: ["A. [Amino acid]n -> Protein", "B. Protein -> [Amino acid]n", "C. [Nucleotide]n -> Protein", "D. Protein -> [Nucleotide]n"], correct: 0, explanation: "Protein là một polymer được tổng hợp thông qua quá trình dịch mã, nối nhiều đơn phân (amino acid) lại với nhau." },
            { id: 15, text: "Vi sinh vật tổng hợp lipid bằng cách:", options: ["A. Liên kết glycerol và glutamic acid.", "B. Liên kết lysine và acid béo.", "C. Liên kết glycerol và acid béo.", "D. Liên kết lysine và glutamic acid."], correct: 2, explanation: "Phân tử lipid (chất béo) đơn giản được cấu tạo từ sự liên kết este giữa 1 phân tử glycerol và 3 phân tử acid béo." },
            { id: 16, text: "Việc làm nước tương, nước mắm trong dân gian thực chất là ứng dụng của quá trình gì?", options: ["A. Phân giải carbohydrate.", "B. Phân giải protein.", "C. Tổng hợp protein.", "D. Phân giải nucleic acid."], correct: 1, explanation: "Vi sinh vật tiết ra enzyme protease để phân giải protein phức tạp trong cá hoặc đậu nành thành các amino acid (thành phần chính của nước mắm/tương)." },
            { id: 17, text: "Phát biểu nào sau đây là sai khi nói về sự tổng hợp protein của vi sinh vật?", options: ["A. Vi sinh vật có khả năng tự tổng hợp các loại amino acid.", "B. Vi sinh vật có khả năng tổng hợp protein.", "C. Protein tổng hợp được khi liên kết các amino acid với nhau bằng liên kết glycosid.", "D. Phương trình tổng hợp protein là: (Amino acid)n -> Protein."], correct: 2, explanation: "Các amino acid liên kết với nhau bằng liên kết PEPTIDE. Liên kết glycosid là của phân tử đường (carbohydrate)." },
            { id: 18, text: "Có hai hình thức lên men, đó là:", options: ["A. Lên men rượu và lên men lactic.", "B. Lên men hiếu khí và lên men kị khí.", "C. Lên men lactic và lên men hiếu khí.", "D. Lên men rượu và lên men kị khí."], correct: 0, explanation: "Lên men rượu (tạo cồn ethanol) và lên men lactic (tạo acid lactic) là hai hình thức lên men phổ biến nhất được ứng dụng." },
            { id: 19, text: "Bằng cách nào vi sinh vật có thể hấp thụ được các chất có kích thước phân tử lớn như protein, tinh bột, lipid, cellulose?", options: ["A. Chúng được vận chuyển chủ động qua các kênh trên màng sinh.", "B. Chúng được khuếch tán trực tiếp qua màng sinh chất.", "C. Các phân tử nói trên vào tế bào theo cơ chế nhập bào.", "D. Chúng tiết ra các enzyme tương ứng để phân giải ngoại bào sau đó hấp thụ."], correct: 3, explanation: "Do thành tế bào cứng nhắc, vi sinh vật tiết enzyme ngoại bào ra ngoài môi trường để cắt nhỏ đại phân tử thành monomer, sau đó mới hấp thụ qua màng." },
            { id: 20, text: "Môi trường nuôi không cấy liên tục là môi trường nuôi cấy:", options: ["A. Được bổ sung chất dinh dưỡng, không được lấy đi các sản phẩm của quá trình nuôi cấy", "B. Không được bổ sung chất dinh dưỡng, nhưng được lấy đi các sản phẩm của quá trình nuôi cấy.", "C. Không được bổ sung chất dinh dưỡng, không được lấy đi các sản phẩm của quá trình nuôi cấy.", "D. Được bổ sung chất dinh dưỡng, và được lấy đi các sản phẩm của quá trình nuôi cấy."], correct: 2, explanation: "Đặc điểm của nuôi cấy không liên tục là cho dưỡng chất vào 1 lần từ đầu, không bổ sung thêm và cũng không rút sản phẩm ra giữa chừng." },
            { id: 21, text: "Quá trình phân giải các hợp chất carbohydrate ở vi sinh vật xảy ra ở:", options: ["A. bên trong nhân tế bào vi sinh vật.", "B. bên ngoài cơ thể vi sinh vật.", "C. bên trong tế bào chất tế bào vi sinh vật.", "D. tại ti thể của tế bào vi sinh vật."], correct: 1, explanation: "Carbohydrate phức tạp (như tinh bột, cellulose) kích thước lớn, nên VSV phải tiết enzyme phân giải ngoại bào (bên ngoài cơ thể) trước khi hấp thu." },
            { id: 22, text: "Mục đích thường thấy của việc nuôi cấy vi khuẩn không liên tục là để:", options: ["A. Hạn chế sự sinh trưởng của vi khuẩn.", "B. Thu được nhiều sản phẩm và sinh khối từ vi sinh vật.", "C. Tăng mật độ tế bào vi khuẩn ở mức cao nhất.", "D. Nghiên cứu quá trình sinh trưởng của vi khuẩn đó."], correct: 3, explanation: "Nuôi cấy không liên tục giúp quan sát rõ cả 4 pha sinh trưởng (tiềm phát, lũy thừa, cân bằng, suy vong), dùng để nghiên cứu đường cong sinh trưởng." },
            { id: 23, text: "Môi trường nuôi cấy liên tục là môi trường nuôi cấy:", options: ["A. Được bổ sung chất dinh dưỡng, không được lấy đi các sản phẩm của quá trình nuôi cấy", "B. Không được bổ sung chất dinh dưỡng, nhưng được lấy đi các sản phẩm của quá trình nuôi cấy.", "C. Không được bổ sung chất dinh dưỡng, không được lấy đi các sản phẩm của quá trình nuôi cấy.", "D. Được bổ sung chất dinh dưỡng, và được lấy đi các sản phẩm của quá trình nuôi cấy."], correct: 3, explanation: "Nuôi cấy liên tục đòi hỏi việc thêm chất dinh dưỡng mới và rút sinh khối/sản phẩm ra cùng một lúc để duy trì quần thể luôn ở pha sinh trưởng." },
            { id: 24, text: "Vai trò của vi sinh vật đối với tự nhiên là:", options: ["A. Phân giải các chất thải đặc biệt là các chất thải độc hại như: nhựa, hóa chất nhân tạo, chất phóng xạ làm giảm ô nhiễm môi trường.", "B. Cộng sinh trong cơ thể người giúp tăng cường miễn dịch, tiêu hóa; tổng hợp một số vitamin, amino axit không thay thế.", "C. VSV tự dưỡng tạo ra O2 và chất dinh dưỡng cung cấp cho các sinh vật dị dưỡng.", "D. Sử dụng trong chế biến thực phẩm, sản xuất thuốc kháng sinh, vitamin, … trên quy mô công nghiệp."], correct: 2, explanation: "Tạo ra O2 và là mắt xích thức ăn đầu tiên (sinh vật sản xuất) là vai trò quan trọng bậc nhất của vi sinh vật quang tự dưỡng đối với hệ sinh thái." },
            { id: 25, text: "Mục đích của việc sử dụng môi trường nuôi cấy vi khuẩn liên tục trong công nghiệp là:", options: ["A. Hạn chế sự sinh trưởng của vi sinh vật.", "B. Thu được nhiều sản phẩm và sinh khối từ vi sinh vật.", "C. Tăng mật độ tế bào vi sinh vật ở mức cao nhất.", "D. Kéo dài thời gian thế hệ của quần thể vi sinh vật."], correct: 1, explanation: "Nuôi cấy liên tục giúp quần thể duy trì ở pha lũy thừa trong thời gian dài, tối ưu hóa việc sản xuất lượng lớn sinh khối và các chất có ích." },
            { id: 26, text: "Đối với con người vi sinh vật có vai trò:", options: ["A. Cộng sinh nhiều loài sinh vật giúp các loài tồn tại trong tự nhiên.", "B. Phân giải các chất thải độc hại làm giảm ô nhiễm môi trường.", "C. Tạo ra oxi và các chất dinh dưỡng cung cấp cho các sinh vật.", "D. Phân giải xác sinh vật làm giàu dinh dưỡng cho đất trồng."], correct: 1, explanation: "Việc VSV phân giải chất thải sinh hoạt, nhựa, rác thải công nghiệp giúp làm sạch môi trường sống trực tiếp của con người." },
            { id: 27, text: "Vì sao vi sinh vật đặc biệt có ích cho ngành nông nghiệp?", options: ["A. Vi sinh vật có khả năng biến đạm khó tiêu thành đạm dễ tiêu.", "B. Vi sinh vật có khả năng biến lân khó tiêu thành lân dễ tiêu.", "C. Vi sinh vật có khả năng biến kali khó tiêu thành kali dễ tiêu.", "D. Vi sinh vật có khả năng biến khoáng khó tiêu thành khoáng dễ tiêu."], correct: 0, explanation: "Vi khuẩn cố định đạm (như Rhizobium) có khả năng chuyển hóa N2 (khí nito tự do) thành dạng NH4+ để cây trồng dễ dàng hấp thu." },
            { id: 28, text: "Con người chú trọng việc sử dụng thuốc trừ sâu vi sinh thay cho thuốc trừ sâu hóa học vì:", options: ["A. Thuốc trừ sâu hóa học tiêu diệt sâu, bệnh trên diện tích rộng.", "B. Thuốc trừ sâu hóa học thường có thời gian phân hủy kéo dài gây tồn dư độc hại.", "C. Thuốc trừ sâu hóa học có khả năng tiêu diệt nhanh sâu, bệnh.", "D. Thuốc trừ sâu hóa học rất phức tạp trong khâu bảo quản."], correct: 1, explanation: "Thuốc hóa học gây ô nhiễm đất, nước và làm tồn dư chất độc trên nông sản. Thuốc sinh học khắc phục được nhược điểm này." },
            { id: 29, text: "Nhận định nào sao đây không nói về lợi ích của kích thước nhỏ ở vi sinh vật?", options: ["A. Làm tăng tốc độ trao đổi chất và sinh trưởng", "B. Có lợi trong việc lưu trữ, nuôi cấy và nghiên cứu vi sinh vật", "C. Tạo ra oxi và cung cấp chất dinh dưỡng", "D. Tạo ra một số lượng lớn tế bào trong một khoảng không gian nhỏ"], correct: 2, explanation: "Tạo ra Oxi là đặc trưng của hình thức 'quang tự dưỡng', không phải là hệ quả trực tiếp của việc có kích thước nhỏ." },

                setAnswers({});

                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />

                                                                                }`}
                                                                        >
                                                                            Sai
                                                                        </button>
                                                                    </div>
                                                                </div>

                                                                {/* Hiển thị giải thích khi trả lời sai (Phần Đúng/Sai) */}
                                                                {isWrong && stmt.explanation && (
                                                                    <div className="mt-2 text-sm text-gray-700 bg-white border border-red-200 p-3 rounded-lg shadow-sm mx-1">
                                                                        <span className="font-bold text-red-600">💡 Giải thích:</span> {stmt.explanation}
                                                                    </div>
                                                                )}
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>

                                {tfAnsweredCount === tfTotalStmts && (
                                    <div className="mt-12 bg-purple-600 text-white rounded-xl shadow-xl p-8 text-center">
                                        <h2 className="text-3xl font-bold mb-4">Hoàn thành Phần II! 🎉</h2>
                                        <p className="text-xl mb-6">Điểm số Đúng/Sai: <strong>{tfCorrectCount} / {tfTotalStmts}</strong></p>
                                        <p className="text-lg mb-6">Tổng điểm cả 2 phần: <strong className="text-yellow-300">{correctCount + tfCorrectCount} / {questionsData.length + tfTotalStmts}</strong></p>
                                        <button onClick={() => { setActiveTab('sa'); window.scrollTo(0, 0); }} className="bg-white text-purple-600 hover:bg-gray-100 font-bold py-3 px-8 rounded-full shadow-lg smooth-transition text-lg">
                                            Chuyển sang Phần III
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Tab Phần III: Trả lời ngắn */}
                        {activeTab === 'sa' && (
                            <div className="fade-in">
                                <div className="bg-white rounded-xl shadow-md p-6 mb-8 border border-gray-200">
                                    <h2 className="text-xl font-bold text-gray-800 mb-2">Phần III: Trả lời ngắn</h2>
                                    <p className="text-gray-600">Với các dạng câu hỏi này, bạn hãy tự suy nghĩ đáp án trong đầu (hoặc viết ra nháp), sau đó bấm <strong>"Xem đáp án"</strong> để đối chiếu kết quả nhé.</p>
                                </div>

                                <div className="space-y-8">
                                    {shortAnswersData.map((q) => (
                                        <div key={`sa-${q.id}`} className="bg-white rounded-xl shadow-sm p-6 border border-gray-200 hover:shadow-md smooth-transition">
                                            <h4 className="text-lg font-semibold text-gray-800 mb-4 whitespace-pre-line">{q.question}</h4>

                                            {!revealedAnswers[`sa-${q.id}`] ? (
                                                <button
                                                    onClick={() => setRevealedAnswers(prev => ({ ...prev, [`sa-${q.id}`]: true }))}
                                                    className="bg-blue-100 text-blue-700 hover:bg-blue-200 font-medium py-2 px-4 rounded-lg transition-colors text-sm"
                                                >
                                                    👁️ Xem đáp án
                                                </button>
                                            ) : (
                                                <div className="mt-3 bg-green-50 border border-green-200 p-4 rounded-lg text-green-900 whitespace-pre-line fade-in">
                                                    <span className="font-bold">Đáp án:</span><br />{q.answer}
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>

                                <div className="mt-12 bg-blue-600 text-white rounded-xl shadow-xl p-8 text-center">
                                    <h2 className="text-3xl font-bold mb-4">Hoàn thành Phần III! 🎉</h2>
                                    <button onClick={() => { setActiveTab('essay'); window.scrollTo(0, 0); }} className="bg-white text-blue-600 hover:bg-gray-100 font-bold py-3 px-8 rounded-full shadow-lg smooth-transition text-lg">
                                        Chuyển sang Phần IV
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* Tab Phần IV: Tự luận */}
                        {activeTab === 'essay' && (
                            <div className="fade-in">
                                <div className="bg-white rounded-xl shadow-md p-6 mb-8 border border-gray-200">
                                    <h2 className="text-xl font-bold text-gray-800 mb-2">Phần IV: Tự luận</h2>
                                    <p className="text-gray-600">Hãy đọc kĩ câu hỏi, tự trình bày câu trả lời, sau đó bấm <strong>"Xem đáp án"</strong> để tham khảo gợi ý nhé.</p>
                                </div>

                                <div className="space-y-8">
                                    {essayData.map((q) => (
                                        <div key={`es-${q.id}`} className="bg-white rounded-xl shadow-sm p-6 border border-gray-200 hover:shadow-md smooth-transition">
                                            <h4 className="text-lg font-semibold text-gray-800 mb-4 whitespace-pre-line">{q.question}</h4>

                                            {!revealedAnswers[`es-${q.id}`] ? (
                                                <button
                                                    onClick={() => setRevealedAnswers(prev => ({ ...prev, [`es-${q.id}`]: true }))}
                                                    className="bg-blue-100 text-blue-700 hover:bg-blue-200 font-medium py-2 px-4 rounded-lg transition-colors text-sm"
                                                >
                                                    👁️ Xem đáp án
                                                </button>
                                            ) : (
                                                <div className="mt-3 bg-green-50 border border-green-200 p-4 rounded-lg text-green-900 whitespace-pre-line leading-relaxed fade-in">
                                                    <span className="font-bold">Hướng dẫn trả lời:</span><br /><br />{q.answer}
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>

                                <div className="mt-12 bg-blue-600 text-white rounded-xl shadow-xl p-8 text-center">
                                    <h2 className="text-3xl font-bold mb-4">Bạn đã hoàn thành toàn bộ đề cương! 🎉</h2>
                                    <p className="text-xl mb-6">Chúc bạn ôn tập thật tốt và đạt điểm cao trong kì thi nhé.</p>
                                    <button onClick={requestReset} className="bg-white text-blue-600 hover:bg-gray-100 font-bold py-3 px-8 rounded-full shadow-lg smooth-transition text-lg">
                                        Ôn tập lại từ đầu
                                    </button>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
