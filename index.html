<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn Thi Hoặc KO=)))</title>
    <style>
        /* Setup giao diện cơ bản */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e; /* Nền tối */
            color: #cccccc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            color: #ffffff;
            margin-bottom: 30px;
        }

        /* Style cho nút bấm */
        .btn-link {
            display: grid;
            grid-template-columns: repeat(auto-fit , minmax(100px, 1fr));
            text-align: center;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
            background-color: #0e639c; /* Màu xanh chuẩn */
            text-decoration: none; /* Bỏ gạch chân của thẻ a */
            border-radius: 6px;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        /* Hiệu ứng khi di chuột vào nút */
        .btn-link:hover {
            background-color: #1177bb;
        }

        /* Hiệu ứng khi click vào nút */
        .btn-link:active {
            transform: scale(0.96);
        }

        .textdom {
            font-weight: bold;
            font-size: 3rem;
            background: linear-gradient(
                90deg,
                #ff0000,
                #ff7f00,
                #ffff00,
                #00ff00,
                #0000ff,
                #4b0082,
                #9400d3,
                #ff0000
            );

            background-size: 400%;

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;

            animation: gradientMove 6s ease infinite;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
            letter-spacing: 2px;
            }

            @keyframes gradientMove {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
            }
    </style>
</head>
<body>

    <h1 class="textdom">Ôn thi cùng Đóm</h1>
    
    <!-- Đây là phần nút bấm chuyển sang val.html -->
    <a href="vlck2.html" class="btn-link">Lý</a>
    <a href="sinhck2.html" class="btn-link">Sinh</a>
    <a href="toanck2.html" class="btn-link">Toán</a>
    <a href="hoack2.html" class="btn-link">Hóa</a>
    <a href="vanck2.html" class="btn-link">Văn</a>
    <a href="english.html" class="btn-link">Anh</a>
    <a href="desinh.html" class="btn-link">Đề Sinh=))</a>
    <!-- <a href="clock.html" class="btn-link">⏰ Đồng Hồ</a> -->

</body>
</html>
